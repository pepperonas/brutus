name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RELEASE_STORE_BASE64: ${{ secrets.RELEASE_STORE_BASE64 }}
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Decode keystore (no-op if secret empty)
        run: |
          if [ -n "${RELEASE_STORE_BASE64:-}" ]; then
            mkdir -p "$RUNNER_TEMP/ks"
            printf '%s' "$RELEASE_STORE_BASE64" | base64 -d > "$RUNNER_TEMP/ks/brutus.jks"
            echo "RELEASE_STORE_FILE=$RUNNER_TEMP/ks/brutus.jks" >> "$GITHUB_ENV"
            echo "Keystore decoded for signed build."
          else
            echo "No keystore secret set — building unsigned release APK."
          fi

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Rename APK with tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/app-release*.apk "out/brutus-${TAG_NAME}.apk"
          ls -la out/

      - name: Attach APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
          generate_release_notes: true
