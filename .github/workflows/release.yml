name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore (if secret present)
        if: ${{ secrets.RELEASE_STORE_BASE64 != '' }}
        env:
          RELEASE_STORE_BASE64: ${{ secrets.RELEASE_STORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/ks"
          printf '%s' "$RELEASE_STORE_BASE64" | base64 -d > "$RUNNER_TEMP/ks/brutus.jks"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/ks/brutus.jks" >> "$GITHUB_ENV"

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Build release APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Rename APK with tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk "out/brutus-${TAG_NAME}.apk"
          ls -la out/

      - name: Attach APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
          generate_release_notes: true
